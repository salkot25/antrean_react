<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>QMS PLN</title>
    <script>
      // GitHub Pages SPA redirect: encode path into query string for root deployment.
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          '/?/' +
          l.pathname.slice(1).replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
